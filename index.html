<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas & Chain</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes shimmer{0%,100%{background-position:-200% center}50%{background-position:200% center}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 20px rgba(212,168,83,.3)}50%{box-shadow:0 0 40px rgba(212,168,83,.6)}}
@keyframes rotateRing{0%{transform:translate(-50%,-50%) rotate(0)}100%{transform:translate(-50%,-50%) rotate(360deg)}}
body{min-height:100vh;background-color:#0A0A0F;background-image:linear-gradient(rgba(212,168,83,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(212,168,83,.03) 1px,transparent 1px);background-size:40px 40px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Georgia,serif;color:#D4A853;overflow:hidden}
.container{text-align:center;padding:2rem;max-width:420px;width:90%}
.logo{font-size:3.5rem;margin-bottom:.5rem;position:relative;display:inline-block;width:80px;height:80px}
.logo-ring{position:absolute;top:50%;left:50%;width:80px;height:80px;border:2px solid rgba(212,168,83,.3);border-top-color:#D4A853;border-radius:50%;animation:rotateRing 3s linear infinite}
.logo-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.5rem}
.title{font-size:2.5rem;font-weight:bold;background:linear-gradient(90deg,#D4A853,#F5E6B8,#D4A853,#B8860B,#D4A853);background-size:400% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s ease-in-out infinite;margin:.75rem 0;letter-spacing:1px}
.subtitle{font-size:1.1rem;color:#F5E6B8;margin-bottom:.5rem;font-style:italic}
.tagline{font-size:.85rem;color:rgba(212,168,83,.6);margin-bottom:2.5rem;letter-spacing:2px;text-transform:uppercase}
.cta-btn{background:linear-gradient(135deg,#D4A853,#B8860B);color:#0A0A0F;border:none;padding:1rem 2.5rem;font-size:1.1rem;font-family:Georgia,serif;font-weight:bold;border-radius:50px;cursor:pointer;letter-spacing:1px;transition:all .3s;animation:pulseGlow 2s ease-in-out infinite}
.cta-btn:active{transform:scale(.97)}
.footer{position:fixed;bottom:1.5rem;font-size:.75rem;color:rgba(212,168,83,.4);letter-spacing:1px}
</style>
</head>
<body>
<div class="container" id="main">
<div class="logo"><div class="logo-ring"></div><span class="logo-icon">&#9881;</span></div>
<h1 class="title">Canvas &amp; Chain</h1>
<p class="subtitle">You made it. They'll bid on it.</p>
<p class="tagline">Where Art Meets the Chain</p>
<button class="cta-btn" onclick="document.getElementById('main').style.opacity='0';document.getElementById('main').style.transition='opacity .8s';setTimeout(function(){location.href='live-auctions.html'},800)">Step in and enjoy &#8594;</button>
</div>
<div class="footer">Powered by TON Blockchain</div>
</body>
</html>
